<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Daftar - Sinvoice</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">

  <!-- LEFT -->
  <div class="auth-left">
    <div class="auth-left__content">
      <h2>Kelola Invoice Lebih Mudah</h2>
      <p>Buat invoice profesional, kirim ke klien, dan terima pembayaran otomatis.</p>

      <div class="auth-left__perks">
        <div class="auth-left__perk">✅ Invoice tanpa batas</div>
        <div class="auth-left__perk">💳 Pembayaran otomatis</div>
        <div class="auth-left__perk">📊 Laporan keuangan</div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <div class="auth-form-box">
      <h1>Daftar Akun</h1>
      <p class="auth-form-box__sub">
        Sudah punya akun? <a href="login.html">Login</a>
      </p>

      <form>
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" placeholder="Masukkan nama">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="email@email.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="********">
        </div>

        <button class="btn-form">Daftar Sekarang</button>
      </form>

      <p class="terms-note">
        Dengan mendaftar, Anda menyetujui 
        <a href="terms.html">Syarat & Ketentuan</a> dan 
        <a href="privacy.html">Kebijakan Privasi</a>.
      </p>

    </div>
  </div>

</div>

</body>
</html>
