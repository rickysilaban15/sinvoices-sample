<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard - Sinvoice</title>

<style>
body { font-family: Arial; background:#f9fafb; }
.container { max-width:900px; margin:auto; padding:20px; }
.box { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
input { padding:8px; margin:5px 0; width:100%; }
button { padding:10px; background:#2563eb; color:white; border:none; cursor:pointer; }
.invoice { border-bottom:1px solid #eee; padding:10px 0; }
</style>
</head>

<body>

<div class="container">

<h1>Dashboard</h1>

<div class="box">
<h2>Tambah Client</h2>
<input id="clientName" placeholder="Nama Client">
<button onclick="addClient()">Simpan</button>
</div>

<div class="box">
<h2>Buat Invoice</h2>
<input id="invoiceClient" placeholder="Nama Client">
<input id="invoiceItem" placeholder="Item">
<input id="invoicePrice" placeholder="Harga">
<button onclick="addInvoice()">Buat Invoice</button>
</div>

<div class="box">
<h2>Daftar Invoice</h2>
<div id="invoiceList"></div>
</div>

</div>
<button onclick="logout()">Logout</button>



<script>

// ambil data
let clients = JSON.parse(localStorage.getItem('clients')) || [];
let invoices = JSON.parse(localStorage.getItem('invoices')) || [];

// tambah client
function addClient() {
  let name = document.getElementById('clientName').value;
  if (!name) return alert("Isi nama");

  clients.push({ name });
  localStorage.setItem('clients', JSON.stringify(clients));

  alert("Client ditambahkan");
}

// tambah invoice
function addInvoice() {
  let client = document.getElementById('invoiceClient').value;
  let item = document.getElementById('invoiceItem').value;
  let price = document.getElementById('invoicePrice').value;

  if (!client || !item || !price) return alert("Isi semua");

  invoices.push({ client, item, price });
  localStorage.setItem('invoices', JSON.stringify(invoices));

  renderInvoices();
}

// tampilkan invoice
function renderInvoices() {
  let list = document.getElementById('invoiceList');
  list.innerHTML = "";

  invoices.forEach(inv => {
    list.innerHTML += `
      <div class="invoice">
        <strong>${inv.client}</strong><br>
        ${inv.item} - Rp ${inv.price}
      </div>
    `;
  });
}

renderInvoices();

if (localStorage.getItem("login") !== "true") {
  window.location = "login.html";
}

function logout() {
  localStorage.removeItem("login");
  window.location = "login.html";
}
</script>

</body>
</html>
