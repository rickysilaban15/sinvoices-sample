<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak - Sinvoice</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f9fafb;
  color: #333;
}

.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 10px;
}

h1 { margin-bottom: 10px; }
p { margin-bottom: 20px; }

.form-group {
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  background: #2563eb;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.contact-info {
  margin-top: 30px;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
<h1>Kontak Kami</h1>
<p>Punya pertanyaan atau butuh bantuan? Hubungi kami lewat form di bawah atau kontak langsung.</p>

<form>
  <div class="form-group">
    <input type="text" placeholder="Nama Anda">
  </div>

  <div class="form-group">
    <input type="email" placeholder="Email Anda">
  </div>

  <div class="form-group">
    <textarea rows="5" placeholder="Pesan Anda"></textarea>
  </div>

  <button>Kirim Pesan</button>
</form>

<div class="contact-info">
  <p>Email: harrasih154@gmail.com</p>
  <p>WhatsApp: +62 823-7432-9445</p>
</div>

</div>

</body>
</html>
